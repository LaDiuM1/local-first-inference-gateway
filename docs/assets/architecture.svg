<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 504" width="880" role="img">
  <style>
    text { font-family: -apple-system, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Helvetica Neue', Arial, sans-serif; }
    .card  { fill: #ffffff; stroke: #d1d9e0; }
    .hero  { stroke-width: 1.5; }
    .title { font-size: 14px; font-weight: 600; fill: #1f2328; }
    .heroTitle { font-size: 15px; font-weight: 600; fill: #1f2328; }
    .detail { font-size: 12.5px; fill: #59636e; }
    .code { font-family: ui-monospace, 'Cascadia Code', Consolas, 'Courier New', monospace; font-size: 11.5px; }
    .codeInk { fill: #1f2328; }
    .edge     { stroke: #59636e; stroke-width: 1.25; fill: none; }
    .primary  { stroke: #1f2328; stroke-width: 1.5; fill: none; }
    .fallback { stroke: #59636e; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
    .labelPrimary  { font-size: 12px; font-weight: 600; fill: #1f2328; }
    .labelFallback { font-size: 12px; font-weight: 600; fill: #59636e; }
    .mask { fill: #ffffff; }
  </style>
  <defs>
    <marker id="mEdge" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#59636e"/>
    </marker>
    <marker id="mPrimary" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1f2328"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="504" rx="12" fill="#ffffff"/>
  <path class="edge" d="M440,68 V78"/>
  <path class="edge" d="M440,134 V146" marker-end="url(#mEdge)"/>
  <path class="edge" d="M440,198 V234" marker-end="url(#mEdge)"/>
  <path class="primary" d="M330,310 C330,346 234,348 234,384" marker-end="url(#mPrimary)"/>
  <path class="fallback" d="M550,310 C550,346 646,348 646,384" marker-end="url(#mEdge)"/>

  <rect class="card" x="240" y="16" width="400" height="52" rx="10"/>
  <text class="title" x="440" y="47" text-anchor="middle">openAt MSA 클라이언트 <tspan class="detail" font-weight="400">(사용 기술 독립)</tspan></text>

  <text class="code codeInk" x="440" y="106" text-anchor="middle">/v1/chat/completions · /v1/responses · /v1/embeddings</text>
  <text class="detail" x="440" y="124" text-anchor="middle" font-size="12">(OpenAI 호환, model = 공개 별칭)</text>

  <rect class="card" x="310" y="150" width="260" height="48" rx="10"/>
  <text class="title" x="440" y="179" text-anchor="middle">Cloudflare Named Tunnel</text>

  <rect class="card hero" x="160" y="238" width="560" height="72" rx="10"/>
  <text class="heroTitle" x="440" y="266" text-anchor="middle">추론 게이트웨이 (FastAPI)</text>
  <text class="detail" x="440" y="290" text-anchor="middle">서비스별 API 키 인증 · 별칭 라우팅 · SSE 스트리밍 중계 · 요청 관측(JSON Lines)</text>

  <rect class="mask" x="248" y="338" width="68" height="20"/>
  <text class="labelPrimary" x="282" y="351" text-anchor="middle">1차 경로</text>
  <rect class="mask" x="556" y="338" width="84" height="20"/>
  <text class="labelFallback" x="598" y="351" text-anchor="middle">로컬 장애 시</text>

  <rect class="card" x="32" y="388" width="404" height="100" rx="10"/>
  <text class="title" x="234" y="416" text-anchor="middle">Ollama</text>
  <text class="detail" x="234" y="442" text-anchor="middle">chat·vision → <tspan class="code">gemma4:12b-it-qat</tspan> (GPU)</text>
  <text class="detail" x="234" y="464" text-anchor="middle">embed → <tspan class="code">snowflake-arctic-embed2</tspan> (CPU 전용 인스턴스)</text>

  <rect class="card" x="444" y="388" width="404" height="100" rx="10"/>
  <text class="title" x="646" y="430" text-anchor="middle">OpenAI gpt-5-mini</text>
  <text class="detail" x="646" y="456" text-anchor="middle">chat·vision만 폴백 (embed는 폴백하지 않음)</text>
</svg>
